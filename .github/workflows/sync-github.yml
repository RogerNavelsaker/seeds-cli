name: Sync GitHub Source

on:
  workflow_dispatch:
  repository_dispatch:
    types: [seeds-dogfood-updated]

concurrency:
  group: nixpkg-seeds-github-source
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync-github-source:
    if: ${{ github.event_name != 'repository_dispatch' || (github.event.action == 'seeds-dogfood-updated' && github.event.client_payload.repository == 'RogerNavelsaker/seeds' && github.event.client_payload.ref == 'refs/heads/dogfood') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@v19

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Sync package from GitHub source
        env:
          SEEDS_SOURCE_REPO_URL: https://github.com/RogerNavelsaker/seeds.git
          SEEDS_SOURCE_OWNER: RogerNavelsaker
          SEEDS_SOURCE_REPO: seeds
          SEEDS_SOURCE_BRANCH: dogfood
        run: bun run sync:github-source

      - name: Detect source revision
        id: version
        run: |
          version=$(jq -r '.package.version' nix/package-manifest.json)
          rev=$(jq -r '.package.sourceRev' nix/package-manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "rev=$rev" >> "$GITHUB_OUTPUT"

      - name: Build package outputs
        run: |
          nix build .#default --no-link
          nix build '.#default^sd' --no-link

      - name: Check if source revision tag exists
        id: tag
        run: |
          if git rev-parse "refs/tags/src-${{ steps.version.outputs.rev }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit source sync
        id: commit
        if: steps.tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nix/package-manifest.json nix/package.nix package.json bun.lock bun.nix
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: sync seeds ${{ steps.version.outputs.version }} from GitHub source"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create source revision tag
        if: steps.tag.outputs.exists == 'false' && steps.commit.outputs.changed == 'true'
        run: |
          git tag "src-${{ steps.version.outputs.rev }}"
          git push origin "src-${{ steps.version.outputs.rev }}"

      - name: Create GitHub release
        if: steps.tag.outputs.exists == 'false' && steps.commit.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: src-${{ steps.version.outputs.rev }}
          generate_release_notes: true
          body: |
            Sync from `RogerNavelsaker/seeds` branch `dogfood`.

            Source package version: `${{ steps.version.outputs.version }}`
            Source revision: `${{ steps.version.outputs.rev }}`
