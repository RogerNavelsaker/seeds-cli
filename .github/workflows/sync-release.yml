name: Sync And Release From NPM

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  sync-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Sync manifest from npm
        run: bun run sync:manifest

      - name: Install Bun dependencies and regenerate bun.nix
        run: bun install

      - name: Detect version
        id: version
        run: |
          version=$(jq -r '.package.version' nix/package-manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check if version tag exists
        id: tag
        run: |
          if git rev-parse "refs/tags/v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit manifest update
        id: commit
        if: steps.tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nix/package-manifest.json package.json bun.lock bun.nix
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: sync ${{ steps.version.outputs.version }} from npm"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: steps.tag.outputs.exists == 'false' && steps.commit.outputs.changed == 'true'
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        if: steps.tag.outputs.exists == 'false' && steps.commit.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          body: |
            Automated sync from npm for `${{ github.event.repository.name }}`.

            Source package version: `${{ steps.version.outputs.version }}`
