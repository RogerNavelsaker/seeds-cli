name: Sync GitHub Source

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-github-source:
    # Keep this workflow disabled until this package switches to a GitHub source lane.
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Sync manifest from GitHub source
        run: bun run sync:github-source
